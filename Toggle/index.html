<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>State based Toggle</title>
</head>
<body>
    <main>
        <div class="toggle">
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>
        <div class="card">
            <img src="https://plus.unsplash.com/premium_photo-1695281399686-087a07cdc39c?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fGNhcnxlbnwwfHwwfHx8MA%3D%3D" alt="Premium car showcasing sleek exterior design and high-end styling">
            <div class="card_info">
                <h3>Luxury That Moves You</h3>
                <p>Step into refined comfort and modern design built for those who expect more from every drive.</p>
                <button>View Details</button>
            </div>
        </div>
    </main>


    <script src="script.js"></script>
</body>
</html>
